<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taskveil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* ── New rich palette from color swatches ── */
  --bg:#0A0612;
  --sf:#130D22;
  --s2:#1A1130;
  --s3:#22173D;
  --bd:rgba(180,100,200,0.12);

  /* Primary: Deep Magenta-Purple (swatch 1) */
  --ac:#9B2080;--a2:#C4359E;
  --adim:rgba(155,32,128,0.15);--aglow:rgba(155,32,128,0.38);

  /* Burnt Orange / Amber (swatch 2) */
  --gold:#D4642A;--gold2:#C8950A;--gdim:rgba(212,100,42,0.15);

  /* Golden Olive (swatch 3) */
  --olive:#BFA818;--olive-dim:rgba(191,168,24,0.13);

  /* Dark Teal (swatch 4) */
  --teal:#1E6878;--teal-dim:rgba(30,104,120,0.15);

  /* Dark Purple/Plum (swatch 5) */
  --plum:#4A1F6E;--plum-dim:rgba(74,31,110,0.15);

  /* Functional */
  --red:#E0324E;--rdim:rgba(224,50,78,0.13);
  --grn:#1BAB7A;--ondim:rgba(27,171,122,0.13);
  --pink:#C4359E;
  --sky:#1E6878;

  --t1:#F0E8FF;--t2:#8878A8;--t3:#4A3868;
  --fd:'Plus Jakarta Sans',sans-serif;--fb:'Inter',sans-serif;--fm:'JetBrains Mono',monospace;
  --rsm:8px;--rmd:12px;--rlg:16px;--r2xl:28px;
  --tr:0.22s cubic-bezier(0.4,0,0.2,1);--ts:0.42s cubic-bezier(0.34,1.56,0.64,1);
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--fb);background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased}
button{font-family:var(--fb);cursor:pointer}
input,select,textarea{font-family:var(--fb)}

/* AUTH */
#auth{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 20% 20%,rgba(155,32,128,.28) 0%,transparent 55%),
             radial-gradient(ellipse at 80% 80%,rgba(212,100,42,.2) 0%,transparent 55%),
             linear-gradient(135deg,#0A0612 0%,#130D22 100%)}
.agl{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.agl .o1{position:absolute;width:500px;height:500px;border-radius:50%;border:1px solid rgba(139,92,246,.12);top:-150px;left:-150px;animation:rot 20s linear infinite}
.agl .o2{position:absolute;width:700px;height:700px;border-radius:50%;border:1px solid rgba(236,72,153,.08);bottom:-250px;right:-250px;animation:rot 30s linear infinite reverse}
.agl .blob{position:absolute;border-radius:50%;filter:blur(80px);animation:blb 8s ease-in-out infinite}
.agl .b1{width:400px;height:400px;background:rgba(155,32,128,.2);top:-80px;left:-80px}
.agl .b2{width:350px;height:350px;background:rgba(212,100,42,.16);bottom:-60px;right:-60px;animation-delay:-3s}
.agl .b3{width:280px;height:280px;background:rgba(30,104,120,.15);top:45%;left:45%;animation-delay:-6s}
@keyframes rot{to{transform:rotate(360deg)}}
@keyframes blb{0%,100%{transform:scale(1) translate(0,0)}50%{transform:scale(1.15) translate(20px,15px)}}
.ac{position:relative;z-index:1;background:rgba(13,17,48,.82);backdrop-filter:blur(24px);
  border:1px solid rgba(155,32,128,.32);border-radius:var(--r2xl);padding:48px;width:460px;
  box-shadow:0 0 0 1px rgba(255,255,255,.04),0 24px 60px rgba(0,0,0,.65),0 0 80px rgba(155,32,128,.12)}
.alg{display:flex;align-items:center;gap:12px;margin-bottom:36px}
.alm{width:44px;height:44px;background:linear-gradient(135deg,var(--ac),var(--gold));border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:21px;font-weight:800;color:#fff;
  box-shadow:0 6px 20px rgba(155,32,128,.4)}
.alt{font-family:var(--fd);font-size:23px;font-weight:800;background:linear-gradient(135deg,#C4359E,#D4642A,#BFA818);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.atit{font-family:var(--fd);font-size:26px;font-weight:800;margin-bottom:6px;
  background:linear-gradient(135deg,var(--t1),#C4359E);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.asub{color:var(--t2);font-size:14px;margin-bottom:28px;line-height:1.6}
.atabs{display:flex;background:rgba(255,255,255,.05);border-radius:var(--rmd);padding:4px;margin-bottom:26px;border:1px solid var(--bd)}
.atab{flex:1;padding:9px;text-align:center;border-radius:var(--rsm);border:none;background:none;font-size:13.5px;font-weight:500;color:var(--t2);transition:var(--tr)}
.atab.on{background:linear-gradient(135deg,rgba(155,32,128,.35),rgba(212,100,42,.2));color:var(--t1);font-weight:600;box-shadow:0 2px 12px rgba(155,32,128,.25)}
.aerr{background:var(--rdim);border:1px solid rgba(244,63,94,.3);border-radius:var(--rsm);padding:11px 14px;font-size:13px;color:var(--red);margin-bottom:14px;display:none}
.fg{margin-bottom:18px}
.fl{display:block;font-size:12.5px;font-weight:600;color:var(--t2);margin-bottom:7px;letter-spacing:.03em}
.fi,.fs,.fta{width:100%;padding:12px 14px;background:rgba(255,255,255,.05);border:1px solid var(--bd);border-radius:var(--rmd);color:var(--t1);font-size:14px;transition:var(--tr);outline:none}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--adim);background:rgba(155,32,128,.07)}
.fi::placeholder,.fta::placeholder{color:var(--t3)}
.fta{resize:vertical;min-height:78px}
.fs{cursor:pointer}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.bp{width:100%;padding:13px;background:linear-gradient(135deg,#9B2080,#D4642A,#BFA818);color:#fff;border:none;
  border-radius:var(--rmd);font-size:14px;font-weight:700;transition:var(--tr);letter-spacing:.04em;
  box-shadow:0 6px 24px rgba(155,32,128,.4)}
.bp:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(155,32,128,.5)}
.bp:active{transform:translateY(0)}
.anote{text-align:center;color:var(--t3);font-size:11.5px;margin-top:16px}

/* APP */
#app{display:none;height:100vh;flex-direction:row}
#app.on{display:flex}

/* SIDEBAR */
#sb{width:264px;display:flex;flex-direction:column;flex-shrink:0;transition:width var(--tr);overflow:hidden;
  background:linear-gradient(180deg,#1F0A2E 0%,#150B25 30%,#0E1020 60%,#080E1C 100%);
  border-right:1px solid rgba(155,32,128,.22);box-shadow:4px 0 30px rgba(0,0,0,.5)}
#sb.col{width:72px}
.sbh{padding:22px 16px 18px;display:flex;align-items:center;gap:11px;border-bottom:1px solid rgba(255,255,255,.08)}
.sbm{width:34px;height:34px;flex-shrink:0;background:linear-gradient(135deg,var(--ac),var(--gold));border-radius:9px;
  display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:14px;font-weight:800;color:#fff;
  box-shadow:0 4px 14px rgba(155,32,128,.45)}
.sbn{font-family:var(--fd);font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;
  transition:opacity var(--tr),max-width var(--tr);max-width:150px;
  background:linear-gradient(135deg,#C4359E,#D4642A,#BFA818);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#sb.col .sbn{opacity:0;max-width:0}
.scb{margin-left:auto;flex-shrink:0;width:26px;height:26px;border-radius:7px;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:var(--t2);
  display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.scb:hover{background:rgba(255,255,255,.14);color:var(--t1)}
.sbu{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08)}
.uav{width:36px;height:36px;flex-shrink:0;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--gold));
  display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;font-family:var(--fd);
  box-shadow:0 3px 12px rgba(155,32,128,.4)}
.uif{overflow:hidden;transition:opacity var(--tr),max-width var(--tr);max-width:150px;min-width:0}
.unm{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.uem{font-size:11px;color:rgba(196,53,158,.9);white-space:nowrap;font-weight:500}
#sb.col .uif{opacity:0;max-width:0}
.sbnv{flex:1;padding:10px 8px;overflow-y:auto}
.sbnv::-webkit-scrollbar{width:0}
.nl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;
  color:rgba(196,53,158,.6);padding:0 10px;margin:12px 0 4px;white-space:nowrap;overflow:hidden;transition:opacity var(--tr)}
#sb.col .nl{opacity:0}
.ni{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--rmd);
  color:rgba(200,210,255,.6);transition:var(--tr);border:none;background:none;width:100%;
  text-align:left;white-space:nowrap;overflow:hidden}
.ni:hover{background:rgba(155,32,128,.18);color:var(--t1)}
.ni.on{background:linear-gradient(135deg,rgba(155,32,128,.3),rgba(212,100,42,.2));color:#fff;
  border:1px solid rgba(155,32,128,.3);box-shadow:0 2px 12px rgba(155,32,128,.2)}
.nico{width:16px;height:16px;flex-shrink:0}
.nlb{font-size:13px;font-weight:500;transition:opacity var(--tr)}
#sb.col .nlb{opacity:0}
.nbdg{margin-left:auto;font-size:10px;font-weight:700;font-family:var(--fm);
  background:linear-gradient(135deg,var(--ac),var(--gold));color:#fff;
  padding:2px 8px;border-radius:20px;flex-shrink:0;transition:opacity var(--tr)}
#sb.col .nbdg{opacity:0}
.sbst{padding:0 8px 10px;transition:opacity var(--tr)}
#sb.col .sbst{opacity:0;pointer-events:none}
.mst{display:flex;justify-content:space-between;align-items:center;padding:4px 8px}
.msl{font-size:11px;color:var(--t2)}
.msv{font-size:11px;font-weight:700;font-family:var(--fm);color:#C4359E}
.mpb{height:5px;background:rgba(255,255,255,.07);border-radius:3px;margin:3px 8px 8px}
.mpf{height:100%;border-radius:3px;background:linear-gradient(90deg,#9B2080,#D4642A,#BFA818);transition:width .7s ease}
.sbbot{padding:8px;border-top:1px solid rgba(255,255,255,.07)}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#tb{height:64px;flex-shrink:0;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:14px;padding:0 24px;
  background:rgba(13,17,48,.95);backdrop-filter:blur(12px)}
.tbt{font-family:var(--fd);font-size:17px;font-weight:700;color:var(--t1)}
.tbs{font-size:12.5px;color:var(--t2);margin-left:6px}
.tbsr{margin-left:auto;position:relative}
.sin{background:rgba(255,255,255,.05);border:1px solid var(--bd);border-radius:20px;
  padding:8px 14px 8px 34px;color:var(--t1);font-size:13px;width:210px;outline:none;transition:var(--tr)}
.sin:focus{border-color:var(--ac);width:270px;box-shadow:0 0 0 3px rgba(155,32,128,.2)}
.sin::placeholder{color:var(--t3)}
.sic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none}
.tbb{padding:9px 18px;border-radius:var(--rmd);background:linear-gradient(135deg,#9B2080,#D4642A);
  color:#fff;border:none;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;transition:var(--tr);
  box-shadow:0 4px 16px rgba(155,32,128,.4)}
.tbb:hover{opacity:.9;transform:translateY(-1px)}
#ct{flex:1;overflow-y:auto;padding:24px;background:var(--bg)}
#ct::-webkit-scrollbar{width:5px}
#ct::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px}

/* STAT CARDS */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.sc{border-radius:var(--rlg);padding:22px;position:relative;overflow:hidden;transition:var(--tr);cursor:default;border:1px solid transparent}
.sc:hover{transform:translateY(-3px)}
.sc.ca{background:linear-gradient(135deg,#280A20,#4A1040);border-color:rgba(155,32,128,.4);box-shadow:0 8px 32px rgba(155,32,128,.22)}
.sc.cg{background:linear-gradient(135deg,#062A1E,#0D4030);border-color:rgba(16,185,129,.35);box-shadow:0 8px 32px rgba(16,185,129,.15)}
.sc.cw{background:linear-gradient(135deg,#2A1200,#402000);border-color:rgba(212,100,42,.4);box-shadow:0 8px 32px rgba(212,100,42,.18)}
.sc.cr{background:linear-gradient(135deg,#280A14,#3D0F1E);border-color:rgba(244,63,94,.35);box-shadow:0 8px 32px rgba(244,63,94,.15)}
.scgl{position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;opacity:.2;filter:blur(30px)}
.sc.ca .scgl{background:#9B2080}.sc.cg .scgl{background:var(--grn)}.sc.cw .scgl{background:#D4642A}.sc.cr .scgl{background:var(--red)}
.scic{width:42px;height:42px;border-radius:var(--rmd);display:flex;align-items:center;justify-content:center;margin-bottom:18px;position:relative;z-index:1}
.sc.ca .scic{background:rgba(155,32,128,.25);color:#C4359E}.sc.cg .scic{background:rgba(16,185,129,.2);color:var(--grn)}
.sc.cw .scic{background:rgba(212,100,42,.2);color:#D4642A}.sc.cr .scic{background:rgba(244,63,94,.2);color:var(--red)}
.scv{font-family:var(--fd);font-size:36px;font-weight:800;line-height:1;margin-bottom:4px;position:relative;z-index:1}
.sc.ca .scv{color:#C084FC}.sc.cg .scv{color:var(--grn)}.sc.cw .scv{color:#D4642A}.sc.cr .scv{color:var(--red)}
.scl{font-size:12px;font-weight:600;opacity:.65;position:relative;z-index:1}
.scc{font-size:11px;margin-top:8px;font-weight:500;opacity:.6;position:relative;z-index:1}
.dg{display:grid;grid-template-columns:1fr 310px;gap:20px}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rlg);padding:20px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.stt{font-family:var(--fd);font-size:15px;font-weight:700;color:var(--t1)}
.sa{font-size:13px;color:#C4359E;cursor:pointer;font-weight:500}
.sa:hover{text-decoration:underline}

/* RING */
.rw{display:flex;align-items:center;justify-content:center;flex-direction:column;padding:16px 0}
.ro{position:relative;width:136px;height:136px}
.ro svg{transform:rotate(-90deg)}
.rbg{fill:none;stroke:var(--s3);stroke-width:10}
.rfi{fill:none;stroke-width:10;stroke-linecap:round;stroke:url(#rg);transition:stroke-dashoffset 1.1s cubic-bezier(.4,0,.2,1)}
.rce{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.rcp{font-family:var(--fd);font-size:28px;font-weight:800;color:var(--t1)}
.rcs{font-size:11px;color:var(--t2)}

/* TASK ITEM */
.ti{display:flex;align-items:flex-start;gap:12px;padding:13px 14px;border-radius:var(--rmd);
  background:var(--sf);border:1px solid var(--bd);margin-bottom:7px;transition:var(--tr);position:relative}
.ti:hover{border-color:rgba(139,92,246,.3);background:var(--s2);transform:translateX(2px)}
.ti.dn{opacity:.4}
.ti.dn .tt{text-decoration:line-through;color:var(--t3)}
.ck{width:20px;height:20px;border-radius:6px;flex-shrink:0;margin-top:2px;border:2px solid var(--bd);
  background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.ck:hover{border-color:var(--ac)}
.ck.on{background:linear-gradient(135deg,#9B2080,#D4642A);border-color:transparent}
.ck.on svg{display:block!important}
.ck svg{display:none;width:11px;height:11px;color:#fff}
.tb2{flex:1;min-width:0;cursor:pointer}
.tt{font-size:13.5px;font-weight:500;margin-bottom:5px;line-height:1.4;color:var(--t1)}
.tm{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.pd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pd.high{background:var(--red)}.pd.medium{background:var(--gold)}.pd.low{background:var(--grn)}
.tg{font-size:10.5px;font-weight:600;padding:2px 9px;border-radius:20px;background:rgba(155,32,128,.15);color:#C4359E;border:1px solid rgba(155,32,128,.25)}
.dl{font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;font-family:var(--fm)}
.dl.ov{background:var(--rdim);color:var(--red)}.dl.sn{background:var(--gdim);color:var(--gold)}.dl.ok{background:var(--ondim);color:var(--grn)}
.cp{font-size:10.5px;font-weight:600;padding:2px 9px;border-radius:20px}
.cp.work{background:rgba(155,32,128,.15);color:#C4359E}.cp.personal{background:var(--ondim);color:var(--grn)}
.cp.health{background:var(--rdim);color:var(--red)}.cp.learning{background:var(--gdim);color:var(--gold)}
.cp.finance{background:rgba(30,104,120,.15);color:#1E9CB0}.cp.other{background:var(--s3);color:var(--t2)}
.ta{display:flex;gap:4px;opacity:0;transition:opacity var(--tr);flex-shrink:0}
.ti:hover .ta{opacity:1}
.tab{width:28px;height:28px;border-radius:var(--rsm);background:none;border:1px solid var(--bd);color:var(--t2);
  display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.tab:hover{background:var(--s3);color:var(--t1)}
.tab.del:hover{background:var(--rdim);border-color:var(--red);color:var(--red)}

/* FILTERS */
.fb{display:flex;align-items:center;gap:7px;margin-bottom:18px;flex-wrap:wrap}
.fbtn{padding:6px 14px;border-radius:20px;background:var(--sf);border:1px solid var(--bd);color:var(--t2);
  font-size:12.5px;font-weight:500;transition:var(--tr);white-space:nowrap}
.fbtn:hover{border-color:var(--ac);color:var(--ac)}
.fbtn.on{background:rgba(155,32,128,.18);border-color:rgba(155,32,128,.45);color:#C4359E;font-weight:600}
.ss{margin-left:auto;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rmd);color:var(--t1);font-size:12.5px;padding:6px 10px;outline:none}

/* WEEKLY */
.wg{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
.wc{min-height:420px}
.wdh{text-align:center;padding:10px 4px;border-radius:var(--rsm);margin-bottom:8px;background:var(--sf);border:1px solid var(--bd)}
.wdh.td{background:linear-gradient(135deg,rgba(155,32,128,.22),rgba(212,100,42,.15));border-color:rgba(155,32,128,.4)}
.wdn{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t2)}
.wdd{font-family:var(--fd);font-size:20px;font-weight:700;margin-top:2px;color:var(--t1)}
.wdh.td .wdd{color:#C4359E}
.wtc{padding:6px 8px;border-radius:var(--rsm);margin-bottom:5px;font-size:11.5px;font-weight:500;cursor:pointer;
  transition:var(--tr);border:1px solid transparent;line-height:1.35;color:var(--t1)}
.wtc.high{background:rgba(244,63,94,.15);border-color:rgba(244,63,94,.25)}
.wtc.medium{background:rgba(245,158,11,.13);border-color:rgba(245,158,11,.25)}
.wtc.low{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.25)}
.wtc.done{opacity:.35;text-decoration:line-through}
.wtc:hover{transform:translateX(2px)}
.wadd{width:100%;padding:5px;background:none;border:1px dashed rgba(139,92,246,.25);border-radius:7px;
  color:var(--t3);font-size:11px;transition:var(--tr);margin-top:6px}
.wadd:hover{border-color:var(--ac);color:var(--ac)}

/* MONTHLY */
.mhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.mnb{width:36px;height:36px;border-radius:var(--rmd);background:var(--sf);border:1px solid var(--bd);color:var(--t2);
  display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.mnb:hover{background:var(--s2);color:var(--t1)}
.mt{font-family:var(--fd);font-size:20px;font-weight:700;background:linear-gradient(135deg,#C4359E,#D4642A,#BFA818);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.mg{display:grid;grid-template-columns:repeat(7,1fr);border:1px solid var(--bd);border-radius:var(--rlg);overflow:hidden}
.mwd{padding:9px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;

  font-size:14px;font-weight:500;transition:var(--tr)}
.bs:hover{background:var(--s3)}

/* TODAY */

.tsl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);
  margin-bottom:9px;display:flex;align-items:center;gap:8px}

@media(max-width:900px){.sg{grid-template-columns:repeat(2,1fr)}.dg{grid-template-columns:1fr}.wg{grid-template-columns:repeat(4,1fr)}}

   LIVING ANIMATIONS — EVERYWHERE
══════════════════════════════════════ */

/* Floating particles canvas */
#particles{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5}

/* Animated gradient background */
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse at var(--mx,50%) var(--my,50%),rgba(155,32,128,.08) 0%,transparent 40%),
    radial-gradient(ellipse at 80% 20%,rgba(212,100,42,.06) 0%,transparent 40%),
    radial-gradient(ellipse at 20% 80%,rgba(30,104,120,.05) 0%,transparent 40%);
  transition:background 0.3s ease;animation:bgpulse 8s ease-in-out infinite}
@keyframes bgpulse{0%,100%{opacity:.7}50%{opacity:1}}

/* Orb float ambient */
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(60px);animation:orbfloat var(--d,12s) ease-in-out infinite var(--delay,0s)}
@keyframes orbfloat{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(var(--x1,30px),var(--y1,-20px)) scale(1.05)}50%{transform:translate(var(--x2,-20px),var(--y2,30px)) scale(.95)}75%{transform:translate(var(--x3,20px),var(--y3,20px)) scale(1.08)}}

/* ── Auth page ── */
.ac{animation:cardrise .7s cubic-bezier(0.34,1.56,0.64,1) forwards}
@keyframes cardrise{from{opacity:0;transform:translateY(40px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.alm{animation:logobeat 2.8s ease-in-out infinite}
@keyframes logobeat{0%,100%{box-shadow:0 6px 20px rgba(155,32,128,.4)}50%{box-shadow:0 6px 32px rgba(155,32,128,.7),0 0 40px rgba(212,100,42,.3)}}
.atit{animation:textglow 3s ease-in-out infinite}
@keyframes textglow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.2)}}

/* Input focus shake-in */
.fi,.fs,.fta{transform-origin:left;transition:border-color .2s,box-shadow .2s,transform .15s}
.fi:focus,.fta:focus{transform:scaleX(1.008)}

/* Button press ripple */
.bp,.bsv,.tbb{position:relative;overflow:hidden}
.bp::after,.bsv::after,.tbb::after{content:'';position:absolute;inset:0;background:radial-gradient(circle,rgba(255,255,255,.3) 0%,transparent 60%);transform:scale(0);opacity:0;transition:transform .5s,opacity .5s}
.bp:active::after,.bsv:active::after,.tbb:active::after{transform:scale(2.5);opacity:0;transition:none}

/* ── Sidebar ── */
#sb{position:relative}
.ni{position:relative;overflow:hidden}
.ni::before{content:'';position:absolute;left:-100%;top:0;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);
  transition:left .4s ease}
.ni:hover::before{left:100%}
.nbdg{animation:bdgpulse 2s ease-in-out infinite}
@keyframes bdgpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}

/* Sidebar mark spin on hover */
.sbm{transition:transform .4s cubic-bezier(0.34,1.56,0.64,1),box-shadow .3s}
#sb:hover .sbm{transform:rotate(10deg) scale(1.08)}

/* ── Stat cards ── */
.sc{transition:transform .3s cubic-bezier(0.34,1.56,0.64,1),box-shadow .3s,border-color .3s;
  animation:cardfadein .5s ease forwards;opacity:0}
.sc:nth-child(1){animation-delay:.05s}
.sc:nth-child(2){animation-delay:.12s}
.sc:nth-child(3){animation-delay:.19s}
.sc:nth-child(4){animation-delay:.26s}
@keyframes cardfadein{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.sc:hover{transform:translateY(-6px) scale(1.025)}
.sc:hover .scgl{opacity:.45;transform:scale(1.3)}
.scgl{transition:opacity .4s,transform .4s}
.scv{transition:transform .3s}
.sc:hover .scv{transform:scale(1.06)}

/* ── Task items ── */
.ti{animation:tifadein .35s ease forwards;opacity:0}
@keyframes tifadein{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
.ti:hover{box-shadow:0 6px 28px rgba(155,32,128,.18),0 2px 8px rgba(0,0,0,.3)}
.ti:hover .tt{background:linear-gradient(135deg,#F0E8FF,#C4359E);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* Stagger task items */
.ti:nth-child(1){animation-delay:.04s}
.ti:nth-child(2){animation-delay:.08s}
.ti:nth-child(3){animation-delay:.12s}
.ti:nth-child(4){animation-delay:.16s}
.ti:nth-child(5){animation-delay:.20s}
.ti:nth-child(6){animation-delay:.24s}
.ti:nth-child(7){animation-delay:.28s}
.ti:nth-child(8){animation-delay:.32s}
.ti:nth-child(9){animation-delay:.36s}
.ti:nth-child(10){animation-delay:.40s}

/* Checkbox bounce */
.ck{transition:transform .25s cubic-bezier(0.34,1.56,0.64,1),background .2s,border-color .2s,box-shadow .25s}
.ck:hover{transform:scale(1.18)}
.ck.on{animation:checkpop .35s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes checkpop{0%{transform:scale(1)}40%{transform:scale(1.35)}70%{transform:scale(.9)}100%{transform:scale(1)}}

/* ── Cards ── */
.card{animation:cardfadein .4s ease forwards;opacity:0;transition:box-shadow .3s,border-color .3s}
.card:hover{border-color:rgba(155,32,128,.28);box-shadow:0 8px 32px rgba(155,32,128,.12)}

/* ── Progress bar ── */
.mpf{position:relative;overflow:hidden}
.mpf::after{content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);
  animation:shimmer 2s ease-in-out infinite}
@keyframes shimmer{0%{left:-100%}100%{left:200%}}

/* ── Ring ── */
.ro{animation:ringspin .6s ease-in;filter:drop-shadow(0 0 12px rgba(155,32,128,.3))}
.ro:hover{filter:drop-shadow(0 0 20px rgba(155,32,128,.5))}
@keyframes ringspin{from{transform:rotate(-10deg) scale(.9);opacity:0}to{transform:rotate(0) scale(1);opacity:1}}
.rcp{animation:countup .8s ease forwards}
@keyframes countup{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}

/* ── Topbar button ── */
.tbb{transition:transform .25s cubic-bezier(0.34,1.56,0.64,1),box-shadow .25s,opacity .2s}
.tbb:hover{transform:translateY(-2px) scale(1.04)}
.tbb svg{transition:transform .3s cubic-bezier(0.34,1.56,0.64,1)}
.tbb:hover svg{transform:rotate(90deg) scale(1.2)}

/* ── Search bar ── */
.sin{transition:width .3s ease,border-color .2s,box-shadow .2s,background .2s}
.sic{transition:transform .3s,color .2s}
.sin:focus ~ .sic,.tbsr:focus-within .sic{transform:translateY(-50%) scale(1.15);color:var(--ac)}

/* ── Filter buttons ── */
.fbtn{transition:all .2s cubic-bezier(0.34,1.56,0.64,1);position:relative;overflow:hidden}
.fbtn:hover{transform:translateY(-2px) scale(1.04)}
.fbtn.on{animation:fbtnpop .3s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes fbtnpop{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}

/* ── Modal ── */
.ov.open .modal{animation:modalin .4s cubic-bezier(0.34,1.56,0.64,1) forwards}
@keyframes modalin{from{opacity:0;transform:scale(.88) translateY(30px)}to{opacity:1;transform:scale(1) translateY(0)}}
.mtt{animation:slidein .3s ease forwards}
@keyframes slidein{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
.fg{animation:fgrise .3s ease forwards;opacity:0}
.fg:nth-child(1){animation-delay:.05s}
.fg:nth-child(2){animation-delay:.10s}
.fg:nth-child(3){animation-delay:.15s}
.fg:nth-child(4){animation-delay:.20s}
.fg:nth-child(5){animation-delay:.25s}
.fg:nth-child(6){animation-delay:.30s}
.fg:nth-child(7){animation-delay:.35s}
@keyframes fgrise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── Toast ── */
.tst{position:relative;overflow:hidden}
.tst::before{content:'';position:absolute;top:0;left:0;width:3px;height:0;background:inherit;animation:toastbar .3s ease forwards .1s}
@keyframes toastbar{to{height:100%}}

/* ── Week view cards ── */
.wc{animation:cardfadein .4s ease forwards;opacity:0}
.wc:nth-child(1){animation-delay:.04s}.wc:nth-child(2){animation-delay:.08s}
.wc:nth-child(3){animation-delay:.12s}.wc:nth-child(4){animation-delay:.16s}
.wc:nth-child(5){animation-delay:.20s}.wc:nth-child(6){animation-delay:.24s}
.wc:nth-child(7){animation-delay:.28s}
.wtc{transition:transform .2s cubic-bezier(0.34,1.56,0.64,1),box-shadow .2s}

/* ── Month cells ── */
.md{transition:background .2s,transform .2s cubic-bezier(0.34,1.56,0.64,1),box-shadow .2s}

/* ── Settings rows ── */
.sr{transition:background .2s,padding-left .2s}
.sr:hover{background:rgba(155,32,128,.06);padding-left:8px}
.sse{animation:cardfadein .4s ease forwards;opacity:0}
.sse:nth-child(1){animation-delay:.05s}.sse:nth-child(2){animation-delay:.12s}
.sse:nth-child(3){animation-delay:.19s}.sse:nth-child(4){animation-delay:.26s}

/* ── Page transition ── */
#ct{transition:opacity .25s ease,transform .25s ease}

.ni.on::after{content:'';position:absolute;right:0;top:20%;height:60%;width:3px;
  border-radius:2px 0 0 2px;background:linear-gradient(180deg,#9B2080,#D4642A);
  animation:indic .3s ease forwards}

/* ── Category breakdown bars ── */
.mpf{animation:barfill 1s ease forwards}
@keyframes barfill{from{width:0!important}to{}}

/* ── Pulse on overdue badge ── */
.dl.ov{animation:overpulse 1.5s ease-in-out infinite}
@keyframes overpulse{0%,100%{box-shadow:0 0 0 0 rgba(224,50,78,.4)}50%{box-shadow:0 0 0 4px rgba(224,50,78,0)}}

/* ── Cursor glow ── */
#cursor-glow{position:fixed;width:300px;height:300px;border-radius:50%;pointer-events:none;z-index:1;
  background:radial-gradient(circle,rgba(155,32,128,.05) 0%,transparent 70%);
  transform:translate(-50%,-50%);transition:transform .08s linear;mix-blend-mode:screen}

/* ── Tag pop ── */
.tg{transition:transform .2s cubic-bezier(0.34,1.56,0.64,1),box-shadow .2s}

.uav{transition:transform .4s cubic-bezier(0.34,1.56,0.64,1),box-shadow .3s}

.esi{display:inline-block;animation:emofloat 3s ease-in-out infinite}
@keyframes emofloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* ── Upcoming row hover ── */
div[onclick^="openMod"]{transition:background .2s,padding-left .2s,transform .2s}
div[onclick^="openMod"]:hover{background:rgba(155,32,128,.08)!important;padding-left:12px;transform:translateX(2px)}

#ct::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#9B2080,#D4642A,#1E6878);border-radius:3px;transition:background .3s}

.wadd{transition:all .25s cubic-bezier(0.34,1.56,0.64,1)}

.scb{transition:transform .3s cubic-bezier(0.34,1.56,0.64,1),background .2s}

/* ── Global smooth for all buttons ── */
button{transition:transform .2s,opacity .2s,box-shadow .2s}
button:active:not(.ck):not(.stck){transform:scale(.95)!important}

/* ── Announcement dot on nav ── */
@keyframes navblink{0%,100%{opacity:1}50%{opacity:.3}}
</style>

<div id="tc"></div>

<script>
// STORAGE: tries window.storage first, falls back to localStorage
// Storage: localStorage primary (persists across sessions), window.storage as bonus
const S = {
  async get(k) {
    // Try localStorage first (always available and persists)
    try {
      const v = localStorage.getItem('tv_' + k);
      if (v !== null) return JSON.parse(v);
    } catch(e) {}
    // Fallback to window.storage (Claude artifact env)
    try { if (window.storage) { const r = await window.storage.get(k); return r ? JSON.parse(r.value) : null; } } catch(e) {}
    return null;
  },
  async set(k, v) {
    let saved = false;
    // Always save to localStorage
    try { localStorage.setItem('tv_' + k, JSON.stringify(v)); saved = true; } catch(e) {}
    // Also save to window.storage if available
    try { if (window.storage) await window.storage.set(k, JSON.stringify(v)); } catch(e) {}
    return saved;
  },
  async del(k) {
    try { localStorage.removeItem('tv_' + k); } catch(e) {}
    try { if (window.storage) await window.storage.delete(k); } catch(e) {}
  }
};

let CU=null, tasks=[], editId=null, delId=null, mSubs=[], mSubCtr=0;
let filt={st:'all',pr:'all'}, srchQ='', view='dash', moOff=0, sbCol=false, authMode='login';
const CATS = {work:'💼 Work',personal:'🏠 Personal',health:'💪 Health',learning:'📚 Learning',finance:'💰 Finance',other:'📌 Other'};

// --- AUTH ---
function swtab(m) {
  authMode = m;
  document.querySelectorAll('.atab').forEach((t,i) => t.classList.toggle('on', (m==='login'&&i===0)||(m==='reg'&&i===1)));
  document.getElementById('atit').textContent = m==='login' ? 'Welcome back' : 'Create your account';
  document.getElementById('asub').textContent = m==='login' ? 'Enter your username and password to continue' : 'Choose a username and password to get started';
  document.getElementById('abtn').textContent = m==='login' ? 'Sign In' : 'Create Account';
  document.getElementById('aerr').style.display = 'none';
}

async function hashPW(pw) {
  try {
    const e = new TextEncoder().encode(pw + 'tv_x9');
    const b = await crypto.subtle.digest('SHA-256', e);
    return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
  } catch(e) {
    let h = 0; for (let c of pw + 'tv_x9') { h = ((h<<5)-h) + c.charCodeAt(0); h |= 0; } return Math.abs(h).toString(16);
  }
}

async function doAuth() {
  const un = document.getElementById('aun').value.trim().toLowerCase().replace(/\s+/g,'_');
  const pw = document.getElementById('apw').value;
  const btn = document.getElementById('abtn');
  document.getElementById('aerr').style.display = 'none';
  if (!un || !pw) return showErr('Please fill in all fields.');
  if (un.length < 3) return showErr('Username must be at least 3 characters.');
  btn.textContent = 'Please wait…'; btn.disabled = true;
  try {
    if (authMode === 'reg') {
      if (pw.length < 4) { btn.textContent='Create Account'; btn.disabled=false; return showErr('Password must be at least 4 characters.'); }
      const ex = await S.get('u:' + un);
      if (ex) { btn.textContent='Create Account'; btn.disabled=false; return showErr('Username already taken. Choose another.'); }
      const hash = await hashPW(pw);
      const user = { username: un, displayName: un, hash, createdAt: Date.now() };
      await S.set('u:' + un, user);
      await S.set('t:' + un, []);
      await S.set('sess', { username: un });
      CU = user; tasks = []; loginOK();
    } else {
      const user = await S.get('u:' + un);
      if (!user) { btn.textContent='Sign In'; btn.disabled=false; return showErr('No account found with this username.'); }
      const hash = await hashPW(pw);
      if (hash !== user.hash) { btn.textContent='Sign In'; btn.disabled=false; return showErr('Incorrect password.'); }
      await S.set('sess', { username: un });
      CU = user; tasks = (await S.get('t:' + un)) || []; loginOK();
    }
  } catch(e) {
    console.error(e); btn.textContent = authMode==='login'?'Sign In':'Create Account'; btn.disabled = false;
    showErr('Something went wrong. Please try again.');
  }
}

function showErr(m) { const e = document.getElementById('aerr'); e.textContent = m; e.style.display = 'block'; }

function loginOK() {
  document.getElementById('auth').style.display = 'none';
  document.getElementById('app').classList.add('on');
  updSBU(); updBdg(); nav('dash');
  toast('Welcome, ' + CU.displayName + '! ✦', 's');
}

async function doLogout() {
  await S.del('sess'); CU = null; tasks = [];
  document.getElementById('app').classList.remove('on');
  document.getElementById('auth').style.display = 'flex';
  document.getElementById('aun').value = ''; document.getElementById('apw').value = '';
  document.getElementById('abtn').textContent = 'Sign In'; document.getElementById('abtn').disabled = false;
  swtab('login');
}

function updSBU() {
  if (!CU) return;
  document.getElementById('sbav').textContent = (CU.displayName||'?').charAt(0).toUpperCase();
  document.getElementById('sbnm').textContent = CU.displayName;
}

// --- SIDEBAR ---
function toggleSB() {
  sbCol = !sbCol;
  document.getElementById('sb').classList.toggle('col', sbCol);
  document.getElementById('colic').setAttribute('d', sbCol ? 'm9 18 6-6-6-6' : 'm15 18-6-6 6-6');
}

// --- NAV ---
const VT = {dash:['Dashboard','Your workspace at a glance'],all:['All Tasks','Everything in one place'],today:['Today',''],week:['This Week','Weekly schedule'],month:['Monthly','Calendar view'],settings:['Settings','Manage your account']};
function nav(v) {
  view = v;
  document.querySelectorAll('.ni[data-v]').forEach(n => n.classList.toggle('on', n.dataset.v === v));
  const [t,s] = VT[v] || [v,''];
  document.getElementById('tbt').textContent = t;
  document.getElementById('tbs').textContent = v==='today' ? new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}) : s;
  srchQ = ''; document.getElementById('srch').value = '';
  render();
}
function render() {
  const c = document.getElementById('ct');
  c.style.cssText = 'opacity:0;transform:translateY(10px);transition:none';
  requestAnimationFrame(() => { c.style.cssText = 'transition:opacity .22s ease,transform .22s ease;opacity:1;transform:translateY(0)'; });
  ({dash:rDash,all:rAll,today:rToday,week:rWeek,month:rMonth,settings:rSettings}[view]||rDash)();
}

// --- TASKS ---
async function saveT() { if (CU) await S.set('t:' + CU.username, tasks); updBdg(); }
function updBdg() {
  const ts = todStr();
  document.getElementById('bdga').textContent = tasks.filter(t => t.status !== 'done').length;
  document.getElementById('bdgt').textContent = tasks.filter(t => t.deadline === ts && t.status !== 'done').length;
  const tot = tasks.length, dn = tasks.filter(t => t.status==='done').length, pct = tot ? Math.round(dn/tot*100) : 0;
  document.getElementById('mspct').textContent = pct + '%';
  document.getElementById('msbar').style.width = pct + '%';
}
function todStr() { return new Date().toISOString().split('T')[0]; }
function dlInfo(ds, ts) {
  if (!ds) return {l:'', c:''};
  const now = new Date(); now.setHours(0,0,0,0);
  const d = new Date(ds+'T00:00:00'), diff = Math.round((d-now)/86400000);
  if (diff < 0) return {l: Math.abs(diff)+'d overdue', c:'ov'};
  if (diff === 0) return {l: ts ? 'Today '+ts : 'Today', c:'sn'};
  if (diff === 1) return {l: 'Tomorrow', c:'sn'};
  if (diff <= 3) return {l: 'In '+diff+' days', c:'sn'};
  return {l: d.toLocaleDateString('en-US',{month:'short',day:'numeric'}), c:'ok'};
}
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function getT() {
  let ts = [...tasks];
  if (srchQ) ts = ts.filter(t => t.title.toLowerCase().includes(srchQ) || (t.description||'').toLowerCase().includes(srchQ) || (t.tags||[]).some(g => g.toLowerCase().includes(srchQ)));
  if (filt.st === 'active') ts = ts.filter(t => t.status !== 'done');
  else if (filt.st === 'done') ts = ts.filter(t => t.status === 'done');
  if (filt.pr !== 'all') ts = ts.filter(t => t.priority === filt.pr);
  return ts;
}
function card(task) {
  const dl = dlInfo(task.deadline, task.time);
  const sd = (task.subtasks||[]).filter(s=>s.done).length, st = (task.subtasks||[]).length;
  const tags = (task.tags||[]).slice(0,2);
  return `<div class="ti ${task.status==='done'?'dn':''}">
    <div class="ck ${task.status==='done'?'on':''}" onclick="togDone('${task.id}');event.stopPropagation()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="tb2" onclick="openMod('${task.id}')">
      <div class="tt">${esc(task.title)}</div>
      <div class="tm">
        <div class="pd ${task.priority||'medium'}"></div>
        <span class="cp ${task.category||'other'}">${CATS[task.category||'other']}</span>
        ${dl.c ? `<span class="dl ${dl.c}">${dl.l}</span>` : ''}
        ${tags.map(t=>`<span class="tg">${esc(t)}</span>`).join('')}
        ${st ? `<span style="font-size:11.5px;color:var(--t2);display:flex;align-items:center;gap:3px"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>${sd}/${st}</span>` : ''}
      </div>
    </div>
    <div class="ta">
      <button class="tab" onclick="openMod('${task.id}');event.stopPropagation()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
      <button class="tab del" onclick="askDel('${task.id}');event.stopPropagation()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg></button>
    </div>
  </div>`;
}
async function togDone(id) {
  const t = tasks.find(x => x.id===id); if (!t) return;
  if (t.status==='done') { t.status='todo'; t.completedAt=null; }
  else { t.status='done'; t.completedAt=Date.now(); toast('Task completed! ✦','s'); confetti(); }
  t.updatedAt = Date.now(); await saveT(); render();
}
function confetti() {
  const cols = ['#8B5CF6','#C084FC','#EC4899','#F59E0B','#10B981','#3B82F6','#F43F5E'];
  if (!document.getElementById('cfx')) { const s=document.createElement('style'); s.id='cfx'; s.textContent='@keyframes cf{0%{opacity:1;transform:scale(1) translateY(0) rotate(0)}100%{opacity:0;transform:scale(0) translateY(-90px) rotate(200deg)}}'; document.head.appendChild(s); }
  for (let i=0; i<22; i++) { const d=document.createElement('div'); const sz=Math.random()*8+5; d.style.cssText=`position:fixed;width:${sz}px;height:${sz}px;border-radius:${Math.random()>.5?'50%':'3px'};background:${cols[i%cols.length]};left:${Math.random()*100}vw;top:${Math.random()*50+20}vh;pointer-events:none;z-index:9999;animation:cf ${.6+Math.random()*.5}s ease-out ${Math.random()*.4}s forwards`; document.body.appendChild(d); setTimeout(()=>d.remove(),1200); }
}
function askDel(id) { delId=id; document.getElementById('dov').classList.add('open'); }
async function confDel() { if(!delId)return; tasks=tasks.filter(t=>t.id!==delId); delId=null; await saveT(); closeDel(); render(); toast('Task deleted','i'); }
function closeDel() { document.getElementById('dov').classList.remove('open'); delId=null; }

// --- MODAL ---
function openMod(id=null) {
  editId=id; mSubs=[]; mSubCtr=0;
  const t = id ? tasks.find(x=>x.id===id) : null;
  document.getElementById('mtt').textContent = id ? 'Edit Task' : 'New Task';
  document.getElementById('savbtn').textContent = id ? 'Save Changes' : 'Create Task';
  document.getElementById('mt').value = t ? t.title : '';
  document.getElementById('md').value = t ? t.description||'' : '';
  document.getElementById('mp').value = t ? t.priority||'medium' : 'medium';
  document.getElementById('mc').value = t ? t.category||'work' : 'work';
  document.getElementById('mdl').value = t ? t.deadline||'' : '';
  document.getElementById('mti').value = t ? t.time||'' : '';
  document.getElementById('mr').value = t ? t.recurrence||'none' : 'none';
  document.getElementById('mtg').value = t ? (t.tags||[]).join(', ') : '';
  if (t) mSubs = (t.subtasks||[]).map(s=>({...s}));
  rSubs();
  document.getElementById('tov').classList.add('open');
  setTimeout(()=>document.getElementById('mt').focus(), 80);
}
function closeMod() { document.getElementById('tov').classList.remove('open'); editId=null; }
function ovCl(e, id) { if (e.target===document.getElementById(id)) { id==='tov' ? closeMod() : closeDel(); } }
function rSubs() {
  document.getElementById('stl').innerHTML = mSubs.map((s,i) => `
    <div class="sti">
      <div class="stck ${s.done?'on':''}" onclick="togSub(${i})">${s.done?'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>':''}</div>
      <input class="stin" value="${esc(s.title)}" placeholder="Subtask…" oninput="updSub(${i},this.value)" style="${s.done?'text-decoration:line-through;color:var(--t3)':''}">
      <button class="strm" onclick="rmSub(${i})"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>`).join('');
}
function addST() { mSubs.push({id:Date.now()+(++mSubCtr),title:'',done:false}); rSubs(); const ins=document.querySelectorAll('.stin'); if(ins.length) ins[ins.length-1].focus(); }
function togSub(i) { mSubs[i].done=!mSubs[i].done; rSubs(); }
function updSub(i,v) { mSubs[i].title=v; }

async function saveTask() {
  const title = document.getElementById('mt').value.trim();
  if (!title) { toast('Please enter a task title.','e'); document.getElementById('mt').focus(); return; }
  const tags = document.getElementById('mtg').value.split(',').map(t=>t.trim()).filter(Boolean);
  const subtasks = mSubs.filter(s=>s.title.trim());
  const data = {title, description:document.getElementById('md').value.trim(), priority:document.getElementById('mp').value, category:document.getElementById('mc').value, deadline:document.getElementById('mdl').value, time:document.getElementById('mti').value, recurrence:document.getElementById('mr').value, tags, subtasks};
  if (editId) {
    const i = tasks.findIndex(t=>t.id===editId);
    if (i!==-1) tasks[i] = {...tasks[i], ...data, updatedAt:Date.now()};
    toast('Task updated ✦','s');
  } else {
    tasks.unshift({id:Date.now().toString(36)+Math.random().toString(36).slice(2), ...data, status:'todo', createdAt:Date.now(), updatedAt:Date.now(), completedAt:null});
    toast('Task created! 🎯','s');
  }
  await saveT(); closeMod(); render();
}

// --- SEARCH/FILTER ---
function doSrch(v) { srchQ=v.toLowerCase(); render(); }
function setF(k,v) { filt[k]=v; render(); }
function sortBy(by) {
  if (by==='deadline') tasks.sort((a,b)=>(a.deadline||'9999')<(b.deadline||'9999')?-1:1);
  else if (by==='priority') { const p={high:0,medium:1,low:2}; tasks.sort((a,b)=>(p[a.priority]||1)-(p[b.priority]||1)); }
  else if (by==='alpha') tasks.sort((a,b)=>a.title.localeCompare(b.title));
  else tasks.sort((a,b)=>b.createdAt-a.createdAt);
  render();
}

function rWeek() {

  const sn=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const range=days[0].toLocaleDateString('en-US',{month:'short',day:'numeric'})+' – '+days[6].toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  document.getElementById('ct').innerHTML=`

function rMonth() {
  const today=new Date(), yr=today.getFullYear(), mn=today.getMonth();
  const vd=new Date(yr,mn+moOff,1), vy=vd.getFullYear(), vm=vd.getMonth();
  const lbl=vd.toLocaleDateString('en-US',{month:'long',year:'numeric'}), ts=todStr();
  const fd=new Date(vy,vm,1).getDay(), dim=new Date(vy,vm+1,0).getDate(), dpm=new Date(vy,vm,0).getDate();
  const cells=[];
  for(let i=fd-1;i>=0;i--)cells.push({d:dpm-i,m:vm-1,y:vy,o:true});
  for(let d=1;d<=dim;d++)cells.push({d,m:vm,y:vy,o:false});
  let i=1; while(cells.length<42) cells.push({d:i++,m:vm+1,y:vy,o:true});
  document.getElementById('ct').innerHTML=`
  <div class="mhd">
    <button class="mnb" onclick="chMo(-1)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
    <div class="mt">${lbl}</div>
    <div style="display:flex;gap:8px">
      ${moOff!==0?`<button class="mnb" onclick="chMo(0)" style="font-size:11px;width:auto;padding:0 12px">Today</button>`:''}
      <button class="mnb" onclick="chMo(1)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>
    </div>
  </div>
  <div class="mg">
    ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="mwd">${d}</div>`).join('')}
    ${cells.map(cell=>{
      const cm=((cell.m%12)+12)%12, cy=cell.m<0?cell.y-1:cell.m>11?cell.y+1:cell.y;
      const ds=cy+'-'+String(cm+1).padStart(2,'0')+'-'+String(cell.d).padStart(2,'0');
      const isT=ds===ts, dt=tasks.filter(t=>t.deadline===ds), vt=dt.slice(0,2), more=dt.length-vt.length;
      return`<div class="md ${cell.o?'om':''} ${isT?'td':''}" onclick="openModDate('${ds}')">
        <div class="mdn">${cell.d}</div>
        ${vt.map(t=>`<div class="mtd ${t.priority}" onclick="event.stopPropagation();openMod('${t.id}')" title="${esc(t.title)}">${esc(t.title)}</div>`).join('')}
        ${more>0?`<div class="mmr">+${more} more</div>`:''}
      </div>`;
    }).join('')}
  </div>`;
}

async function updProfile() {
  const name=document.getElementById('snm').value.trim();
  if(!name){toast('Name cannot be empty','e');return;}
  CU.displayName=name; await S.set('u:'+CU.username,CU); updSBU(); toast('Profile updated ✦','s'); rSettings();
}
async function chgPw() {
  const cp=document.getElementById('cpw').value, np=document.getElementById('npw').value;
  if(!cp||!np){toast('Fill in both fields','e');return;}
  if(np.length<4){toast('Password must be at least 4 characters','e');return;}
  const ch=await hashPW(cp);
  if(ch!==CU.hash){toast('Current password is incorrect','e');return;}
  CU.hash=await hashPW(np); await S.set('u:'+CU.username,CU);
  toast('Password updated ✦','s'); document.getElementById('pwf').style.display='none';
}
async function delAll() {
  if(!confirm('Delete ALL tasks? This cannot be undone.'))return;
  tasks=[]; await saveT(); toast('All tasks deleted','i'); nav('dash');

function toast(msg, type='i') {
  const c=document.getElementById('tc'), d=document.createElement('div');
  d.className='tst '+type;
  d.innerHTML='<span>'+({s:'✅',e:'❌',i:'✦'}[type]||'•')+'</span><span>'+msg+'</span>';
  c.appendChild(d);
  setTimeout(()=>{d.style.animation='tout .3s ease forwards';setTimeout(()=>d.remove(),300);},3200);
}

async function init() {
  try {
    const sess=await S.get('sess');
    if(sess&&sess.username){
      const user=await S.get('u:'+sess.username);
      if(user){

}

// Cursor glow follow
(function(){
  const g = document.getElementById('cursor-glow');
  if (!g) return;
  let mx=window.innerWidth/2, my=window.innerHeight/2;
  let cx=mx, cy=my;
  document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });
  function lerp(a,b,t){return a+(b-a)*t}
  function loop(){
    cx=lerp(cx,mx,.1); cy=lerp(cy,my,.1);
    g.style.left=cx+'px'; g.style.top=cy+'px';
    requestAnimationFrame(loop);
  }
  loop();
})();

// Particle system
(function(){
  const canvas = document.getElementById('particles');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let W, H, particles=[];
  const COLORS = ['rgba(155,32,128,', 'rgba(212,100,42,', 'rgba(191,168,24,', 'rgba(30,104,120,', 'rgba(74,31,110,'];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();
  window.addEventListener('resize', resize);

  class Particle {
    constructor(){this.reset();}
    reset(){
      this.x = Math.random()*W;
      this.y = Math.random()*H;
      this.r = Math.random()*1.8+.4;
      this.vx = (Math.random()-.5)*.3;
      this.vy = (Math.random()-.5)*.3-(Math.random()*.15);
      this.alpha = Math.random()*.5+.1;
      this.color = COLORS[Math.floor(Math.random()*COLORS.length)];
      this.life = 0;
      this.maxLife = Math.random()*300+200;
    }
    update(){
      this.x += this.vx; this.y += this.vy; this.life++;
      if(this.life > this.maxLife || this.y < -10) this.reset();
    }
    draw(){
      const progress = this.life/this.maxLife;
      const alpha = this.alpha * Math.sin(progress*Math.PI);
      ctx.beginPath();
      ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
      ctx.fillStyle = this.color+alpha+')';
      ctx.fill();
    }
  }

  for(let i=0;i<80;i++) particles.push(new Particle());

  function loop(){
    ctx.clearRect(0,0,W,H);
    particles.forEach(p=>{ p.update(); p.draw(); });
    requestAnimationFrame(loop);
  }
  loop();
})();

// Number counter animation for stat cards
function animateCount(el, target, duration=800){
  if (!el) return;
  const start = 0, step = target/((duration/16));
  let cur = 0;
  const t = setInterval(()=>{
    cur = Math.min(cur+step, target);
    el.textContent = Math.floor(cur);
    if(cur >= target) clearInterval(t);
  }, 16);
}

// 3D tilt on stat cards
(function(){
  document.addEventListener('mousemove', e => {
    document.querySelectorAll('.sc').forEach(card => {
      const r = card.getBoundingClientRect();
      const cx = r.left+r.width/2, cy = r.top+r.height/2;
      const dx = (e.clientX-cx)/r.width*14, dy = (e.clientY-cy)/r.height*14;
      const dist = Math.hypot(e.clientX-cx, e.clientY-cy);
      if(dist < 220){
        card.style.transform = `translateY(-6px) scale(1.025) rotateY(${dx}deg) rotateX(${-dy}deg)`;
        card.style.transition = 'transform .1s';
      } else {
        card.style.transform = '';
        card.style.transition = 'transform .4s cubic-bezier(0.34,1.56,0.64,1)';
      }
    });
  });
})();

// Ripple effect on buttons
document.addEventListener('click', e => {
  const btn = e.target.closest('.bp,.bsv,.tbb,.fbtn,.mnb,.bs,.bd,.scb,.wadd,.ast');
  if (!btn) return;
  const r = btn.getBoundingClientRect();
  const rip = document.createElement('span');
  const sz = Math.max(r.width,r.height)*2;
  rip.style.cssText = `position:absolute;width:${sz}px;height:${sz}px;border-radius:50%;
    background:rgba(255,255,255,.2);pointer-events:none;z-index:99;
    transform:scale(0);transition:transform .5s ease,opacity .5s ease;
    left:${e.clientX-r.left-sz/2}px;top:${e.clientY-r.top-sz/2}px`;
  if(getComputedStyle(btn).position==='static') btn.style.position='relative';
  btn.style.overflow='hidden';
  btn.appendChild(rip);
  requestAnimationFrame(()=>{ rip.style.transform='scale(1)'; rip.style.opacity='0'; });
  setTimeout(()=>rip.remove(), 550);
});

// Stagger animation for task items when they appear
function applyStagger(){
  document.querySelectorAll('.ti').forEach((el,i)=>{
    el.style.animation='none';
    el.style.opacity='0';
    el.style.transform='translateX(-14px)';
    setTimeout(()=>{
      el.style.transition='opacity .3s ease, transform .3s ease';
      el.style.opacity='1';
      el.style.transform='translateX(0)';
    }, i*45);
  });
}

// Patch render to trigger stagger
const _origRender = render;
window.render = function(){
  _origRender();
  setTimeout(applyStagger, 30);
  // Animate stat counters after render
  setTimeout(()=>{
    document.querySelectorAll('.scv').forEach(el=>{
      const v = parseInt(el.textContent);
      if(!isNaN(v) && v>0){ el.textContent='0'; animateCount(el,v); }
    });
  }, 100);
};

// Typing animation for greeting
function typewrite(el, text, speed=40){
  if(!el)return;
  el.textContent='';
  let i=0;
  const t=setInterval(()=>{
    if(i<text.length){ el.textContent+=text[i]; i++; }
    else clearInterval(t);
  },speed);
}

// Animate progress bars when they appear
const barObs = new MutationObserver(()=>{
  document.querySelectorAll('.mpf').forEach(bar=>{
    if(!bar.dataset.animated){
      bar.dataset.animated='1';
      const w = bar.style.width;
      bar.style.width='0';
      setTimeout(()=>{ bar.style.transition='width .9s cubic-bezier(0.34,1.56,0.64,1)'; bar.style.width=w; },50);
    }
  });
});
barObs.observe(document.getElementById('ct'), {childList:true,subtree:true});

// Sidebar nav hover sound-like tactile feedback (scale)
document.querySelectorAll('.ni').forEach(ni=>{
  ni.addEventListener('mouseenter',()=>{ ni.style.transition='background .15s,transform .15s cubic-bezier(0.34,1.56,0.64,1)'; ni.style.transform='translateX(3px)'; });
  ni.addEventListener('mouseleave',()=>{ ni.style.transform=''; });
  ni.addEventListener('click',()=>{ ni.style.transform='scale(.97)'; setTimeout(()=>ni.style.transform='',150); });
});

// Glowing border follow on card hover
document.querySelectorAll('.card,.sc,.modal,.ac').forEach(el=>{
  el.addEventListener('mousemove', e=>{
    const r=el.getBoundingClientRect();
    const x=((e.clientX-r.left)/r.width*100).toFixed(1);
    const y=((e.clientY-r.top)/r.height*100).toFixed(1);
    el.style.setProperty('--gx',x+'%');
    el.style.setProperty('--gy',y+'%');
    el.style.borderColor=`rgba(155,32,128,.4)`;
    el.style.boxShadow=`0 0 20px rgba(155,32,128,.12), inset 0 0 20px rgba(155,32,128,.03)`;
  });
  el.addEventListener('mouseleave',()=>{
    el.style.borderColor=''; el.style.boxShadow='';
  });
});

});

// Page load entrance animation
window.addEventListener('load',()=>{
  document.querySelectorAll('.ni').forEach((n,i)=>{
    n.style.opacity='0'; n.style.transform='translateX(-20px)';
    setTimeout(()=>{
      n.style.transition='opacity .3s ease, transform .3s ease';
      n.style.opacity=''; n.style.transform='';
    }, 200+i*60);
  });
});
