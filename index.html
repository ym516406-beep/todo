<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taskveil — Work with Clarity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0C0D14;--surface:#13151F;--s2:#1B1D2E;--s3:#232640;
      --border:rgba(255,255,255,0.07);--accent:#7C6FFF;--a2:#A78BFA;
      --adim:rgba(124,111,255,0.12);--aglow:rgba(124,111,255,0.3);
      --danger:#FF5E7D;--ddim:rgba(255,94,125,0.12);
      --warn:#FFB347;--wdim:rgba(255,179,71,0.12);
      --ok:#3ECFA3;--odim:rgba(62,207,163,0.12);
      --t1:#F0EFF8;--t2:#9B9DB8;--t3:#5E607A;
      --fd:'Plus Jakarta Sans',sans-serif;--fb:'Inter',sans-serif;--fm:'JetBrains Mono',monospace;
      --rsm:8px;--rmd:12px;--rlg:16px;--rxl:20px;--r2xl:28px;
      --tr:0.22s cubic-bezier(0.4,0,0.2,1);--ts:0.4s cubic-bezier(0.34,1.56,0.64,1);
      --sw:260px;
    }
    html,body{height:100%;overflow:hidden}
    body{font-family:var(--fb);background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased}
    button{font-family:var(--fb);cursor:pointer}
    input,select,textarea{font-family:var(--fb)}

    /* AUTH */
    #auth{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:200}
    .ag{position:absolute;inset:0;overflow:hidden;pointer-events:none}
    .ag::before{content:'';position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(124,111,255,.14) 0%,transparent 70%);top:-200px;left:-200px;animation:f1 9s ease-in-out infinite}
    .ag::after{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(62,207,163,.09) 0%,transparent 70%);bottom:-100px;right:-100px;animation:f2 12s ease-in-out infinite}
    @keyframes f1{0%,100%{transform:translate(0,0)}50%{transform:translate(50px,40px)}}
    @keyframes f2{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,-30px)}}
    .ac{position:relative;z-index:1;background:var(--surface);border:1px solid rgba(255,255,255,.08);border-radius:var(--r2xl);padding:48px;width:460px;box-shadow:0 24px 64px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.04)}
    .alg{display:flex;align-items:center;gap:12px;margin-bottom:36px}
    .alm{width:42px;height:42px;background:linear-gradient(135deg,var(--accent),var(--a2));border-radius:11px;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:20px;font-weight:800;color:#fff}
    .alt{font-family:var(--fd);font-size:22px;font-weight:700}
    .atit{font-family:var(--fd);font-size:26px;font-weight:800;margin-bottom:6px}
    .asub{color:var(--t2);font-size:14px;margin-bottom:28px;line-height:1.5}
    .atabs{display:flex;background:var(--s2);border-radius:var(--rmd);padding:4px;margin-bottom:26px}
    .atab{flex:1;padding:9px;text-align:center;border-radius:var(--rsm);border:none;background:none;font-size:13.5px;font-weight:500;color:var(--t2);transition:var(--tr)}
    .atab.on{background:var(--s3);color:var(--t1);box-shadow:0 2px 8px rgba(0,0,0,.35)}
    .aerr{background:var(--ddim);border:1px solid rgba(255,94,125,.25);border-radius:var(--rsm);padding:10px 14px;font-size:13px;color:var(--danger);margin-bottom:14px;display:none}
    .fg{margin-bottom:17px}
    .fl{display:block;font-size:12.5px;font-weight:500;color:var(--t2);margin-bottom:6px}
    .fi,.fs,.fta{width:100%;padding:11px 14px;background:var(--s2);border:1px solid var(--border);border-radius:var(--rmd);color:var(--t1);font-size:14px;transition:var(--tr);outline:none}
    .fi:focus,.fs:focus,.fta:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--adim)}
    .fi::placeholder,.fta::placeholder{color:var(--t3)}
    .fta{resize:vertical;min-height:78px}
    .fs{cursor:pointer}
    .fr{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .bp{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),var(--a2));color:#fff;border:none;border-radius:var(--rmd);font-size:14px;font-weight:600;transition:var(--tr);letter-spacing:.02em}
    .bp:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 8px 28px var(--aglow)}
    .bp:active{transform:translateY(0)}
    .anote{text-align:center;color:var(--t3);font-size:11.5px;margin-top:14px}

    /* APP */
    #app{display:none;height:100vh;flex-direction:row}
    #app.on{display:flex}

    /* SIDEBAR */
    #sb{width:var(--sw);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width var(--tr);overflow:hidden}
    #sb.col{width:72px}
    .sbh{padding:22px 18px 18px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--border)}
    .sbm{width:34px;height:34px;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--a2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:15px;font-weight:800;color:#fff}
    .sbn{font-family:var(--fd);font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;transition:opacity var(--tr),max-width var(--tr);max-width:160px}
    #sb.col .sbn{opacity:0;max-width:0}
    .scb{margin-left:auto;flex-shrink:0;width:26px;height:26px;border-radius:7px;background:none;border:1px solid var(--border);color:var(--t2);display:flex;align-items:center;justify-content:center;transition:var(--tr)}
    .scb:hover{background:var(--s2);color:var(--t1)}
    .sbu{padding:14px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
    .uav{width:34px;height:34px;flex-shrink:0;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--a2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;font-family:var(--fd)}
    .uif{overflow:hidden;transition:opacity var(--tr),max-width var(--tr);max-width:160px;min-width:0}
    .unm{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .uem{font-size:11px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    #sb.col .uif{opacity:0;max-width:0}
    .sbnv{flex:1;padding:10px;overflow-y:auto}
    .sbnv::-webkit-scrollbar{width:0}
    .nl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);padding:0 8px;margin:10px 0 4px;white-space:nowrap;overflow:hidden;transition:opacity var(--tr)}
    #sb.col .nl{opacity:0}
    .ni{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--rmd);color:var(--t2);transition:var(--tr);border:none;background:none;width:100%;text-align:left;white-space:nowrap;overflow:hidden}
    .ni:hover{background:var(--s2);color:var(--t1)}
    .ni.on{background:var(--adim);color:var(--accent)}
    .nico{width:17px;height:17px;flex-shrink:0}
    .nlb{font-size:13px;font-weight:500;transition:opacity var(--tr)}
    #sb.col .nlb{opacity:0}
    .nbdg{margin-left:auto;font-size:10px;font-weight:700;font-family:var(--fm);background:var(--adim);color:var(--accent);padding:2px 7px;border-radius:20px;flex-shrink:0;transition:opacity var(--tr)}
    #sb.col .nbdg{opacity:0}
    .sbst{padding:0 10px 10px;transition:opacity var(--tr)}
    #sb.col .sbst{opacity:0;pointer-events:none}
    .mst{display:flex;justify-content:space-between;align-items:center;padding:4px 8px}
    .msl{font-size:11.5px;color:var(--t2)}
    .msv{font-size:12px;font-weight:700;font-family:var(--fm)}
    .mpb{height:4px;background:var(--s3);border-radius:2px;margin:2px 8px 8px}
    .mpf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--a2));transition:width .7s ease}
    .sbbot{padding:10px;border-top:1px solid var(--border)}

    /* MAIN */
    #main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
    #tb{height:62px;flex-shrink:0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:0 24px;background:var(--bg)}
    .tbt{font-family:var(--fd);font-size:17px;font-weight:700}
    .tbs{font-size:13px;color:var(--t2);margin-left:6px}
    .tbsr{margin-left:auto;position:relative}
    .sin{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:8px 14px 8px 34px;color:var(--t1);font-size:13px;width:210px;outline:none;transition:var(--tr)}
    .sin:focus{border-color:var(--accent);width:270px;box-shadow:0 0 0 3px var(--adim)}
    .sin::placeholder{color:var(--t3)}
    .sic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none}
    .tbb{padding:8px 16px;border-radius:var(--rmd);background:linear-gradient(135deg,var(--accent),var(--a2));color:#fff;border:none;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;transition:var(--tr)}
    .tbb:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 6px 22px var(--aglow)}
    #ct{flex:1;overflow-y:auto;padding:24px}
    #ct::-webkit-scrollbar{width:5px}
    #ct::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px}

    /* STAT CARDS */
    .sg{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
    .sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:20px;position:relative;overflow:hidden;transition:var(--tr)}
    .sc:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4);border-color:rgba(255,255,255,.11)}
    .sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2.5px}
    .sc.ca::before{background:linear-gradient(90deg,var(--accent),var(--a2))}
    .sc.cs::before{background:linear-gradient(90deg,var(--ok),#27d97e)}
    .sc.cw::before{background:linear-gradient(90deg,var(--warn),#ffd04a)}
    .sc.cd::before{background:linear-gradient(90deg,var(--danger),#ff8c9a)}
    .scic{width:40px;height:40px;border-radius:var(--rmd);display:flex;align-items:center;justify-content:center;margin-bottom:16px}
    .scic.ca{background:var(--adim);color:var(--accent)}.scic.cs{background:var(--odim);color:var(--ok)}.scic.cw{background:var(--wdim);color:var(--warn)}.scic.cd{background:var(--ddim);color:var(--danger)}
    .scv{font-family:var(--fd);font-size:34px;font-weight:800;line-height:1;margin-bottom:4px}
    .scl{font-size:12px;color:var(--t2);font-weight:500}
    .scc{font-size:11px;margin-top:8px;font-weight:500}
    .dg{display:grid;grid-template-columns:1fr 310px;gap:20px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:20px}
    .sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .stt{font-family:var(--fd);font-size:15px;font-weight:700}
    .sa{font-size:13px;color:var(--accent);cursor:pointer;font-weight:500}
    .sa:hover{text-decoration:underline}

    /* RING */
    .rw{display:flex;align-items:center;justify-content:center;flex-direction:column;padding:16px 0}
    .ro{position:relative;width:136px;height:136px}
    .ro svg{transform:rotate(-90deg)}
    .rbg{fill:none;stroke:var(--s3);stroke-width:10}
    .rfi{fill:none;stroke-width:10;stroke-linecap:round;stroke:url(#rg);transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1)}
    .rce{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .rcp{font-family:var(--fd);font-size:28px;font-weight:800}
    .rcs{font-size:11px;color:var(--t2)}

    /* TASK ITEM */
    .ti{display:flex;align-items:flex-start;gap:12px;padding:13px 14px;border-radius:var(--rmd);background:var(--surface);border:1px solid var(--border);margin-bottom:7px;transition:var(--tr);position:relative}
    .ti:hover{border-color:rgba(255,255,255,.1);background:var(--s2);transform:translateX(1px)}
    .ti.dn{opacity:.45}
    .ti.dn .tt{text-decoration:line-through;color:var(--t3)}
    .ck{width:20px;height:20px;border-radius:6px;flex-shrink:0;margin-top:2px;border:2px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
    .ck:hover{border-color:var(--accent)}
    .ck.on{background:var(--accent);border-color:var(--accent)}
    .ck.on svg{display:block!important}
    .ck svg{display:none;width:11px;height:11px;color:#fff}
    .tb2{flex:1;min-width:0;cursor:pointer}
    .tt{font-size:13.5px;font-weight:500;margin-bottom:5px;line-height:1.4}
    .tm{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
    .pd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .pd.high{background:var(--danger)}.pd.medium{background:var(--warn)}.pd.low{background:var(--ok)}
    .tg{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--adim);color:var(--accent)}
    .dl{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;font-family:var(--fm)}
    .dl.ov{background:var(--ddim);color:var(--danger)}.dl.sn{background:var(--wdim);color:var(--warn)}.dl.ok{background:var(--odim);color:var(--ok)}
    .cp{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:20px}
    .cp.work{background:rgba(124,111,255,.15);color:#A78BFA}.cp.personal{background:rgba(62,207,163,.15);color:var(--ok)}.cp.health{background:rgba(255,94,125,.15);color:var(--danger)}.cp.learning{background:rgba(255,179,71,.15);color:var(--warn)}.cp.finance{background:rgba(45,212,191,.15);color:#2dd4bf}.cp.other{background:var(--s3);color:var(--t2)}
    .ta{display:flex;gap:4px;opacity:0;transition:opacity var(--tr);flex-shrink:0}
    .ti:hover .ta{opacity:1}
    .tab{width:28px;height:28px;border-radius:var(--rsm);background:none;border:1px solid var(--border);color:var(--t2);display:flex;align-items:center;justify-content:center;transition:var(--tr)}
    .tab:hover{background:var(--s3);color:var(--t1)}
    .tab.del:hover{background:var(--ddim);border-color:var(--danger);color:var(--danger)}

    /* FILTERS */
    .fb{display:flex;align-items:center;gap:7px;margin-bottom:18px;flex-wrap:wrap}
    .fbtn{padding:6px 14px;border-radius:20px;background:var(--surface);border:1px solid var(--border);color:var(--t2);font-size:12.5px;font-weight:500;transition:var(--tr);white-space:nowrap}
    .fbtn:hover{border-color:var(--accent);color:var(--accent)}
    .fbtn.on{background:var(--adim);border-color:var(--accent);color:var(--accent)}
    .ss{margin-left:auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--rmd);color:var(--t1);font-size:12.5px;padding:6px 10px;outline:none}

    /* WEEK */
    .wg{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
    .wc{min-height:420px}
    .wdh{text-align:center;padding:10px 4px;border-radius:var(--rsm);margin-bottom:8px;background:var(--surface)}
    .wdh.td{background:var(--adim)}
    .wdn{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--t2)}
    .wdd{font-family:var(--fd);font-size:20px;font-weight:700;margin-top:2px}
    .wdh.td .wdd{color:var(--accent)}
    .wtc{padding:6px 8px;border-radius:var(--rsm);margin-bottom:5px;font-size:11.5px;font-weight:500;cursor:pointer;transition:var(--tr);border:1px solid transparent;line-height:1.35}
    .wtc.high{background:var(--ddim);border-color:rgba(255,94,125,.2)}.wtc.medium{background:var(--wdim);border-color:rgba(255,179,71,.2)}.wtc.low{background:var(--odim);border-color:rgba(62,207,163,.2)}
    .wtc.done{opacity:.35;text-decoration:line-through}
    .wtc:hover{transform:translateX(2px)}
    .wadd{width:100%;padding:5px;background:none;border:1px dashed var(--border);border-radius:7px;color:var(--t3);font-size:11px;transition:var(--tr);margin-top:6px}
    .wadd:hover{border-color:var(--accent);color:var(--accent)}

    /* MONTH */
    .mhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
    .mnb{width:36px;height:36px;border-radius:var(--rmd);background:var(--surface);border:1px solid var(--border);color:var(--t2);display:flex;align-items:center;justify-content:center;transition:var(--tr)}
    .mnb:hover{background:var(--s2);color:var(--t1)}
    .mt{font-family:var(--fd);font-size:20px;font-weight:700}
    .mg{display:grid;grid-template-columns:repeat(7,1fr);border:1px solid var(--border);border-radius:var(--rlg);overflow:hidden}
    .mwd{padding:9px;text-align:center;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);background:var(--surface);border-bottom:1px solid var(--border)}
    .md{min-height:96px;padding:7px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--bg);transition:var(--tr);cursor:pointer}
    .md:hover{background:var(--surface)}
    .md.om{opacity:.28}
    .md.td{background:rgba(124,111,255,.07)}
    .mdn{font-size:12px;font-weight:600;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:3px}
    .md.td .mdn{background:var(--accent);color:#fff}
    .mtd{font-size:10px;padding:1px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .mtd.high{background:var(--ddim);color:var(--danger)}.mtd.medium{background:var(--wdim);color:var(--warn)}.mtd.low{background:var(--odim);color:var(--ok)}
    .mmr{font-size:10px;color:var(--t3);margin-top:1px}

    /* MODAL */
    .ov{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(7px);z-index:300;display:none;align-items:center;justify-content:center}
    .ov.open{display:flex}
    .modal{background:var(--surface);border:1px solid rgba(255,255,255,.09);border-radius:var(--r2xl);padding:32px;width:560px;box-shadow:0 28px 72px rgba(0,0,0,.6);animation:mi var(--ts) forwards;max-height:90vh;overflow-y:auto}
    .modal::-webkit-scrollbar{width:4px}
    .modal::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
    @keyframes mi{from{opacity:0;transform:scale(.95) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
    .mh2{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
    .mtt{font-family:var(--fd);font-size:19px;font-weight:700}
    .mcl{width:30px;height:30px;border-radius:var(--rsm);background:var(--s2);border:1px solid var(--border);color:var(--t2);display:flex;align-items:center;justify-content:center;transition:var(--tr)}
    .mcl:hover{background:var(--s3);color:var(--t1)}
    .stl{margin-top:7px}
    .sti{display:flex;align-items:center;gap:8px;padding:5px 0}
    .stck{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border);background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
    .stck.on{background:var(--accent);border-color:var(--accent)}
    .stin{flex:1;background:none;border:none;border-bottom:1px solid var(--border);color:var(--t1);font-size:13px;padding:2px 0;outline:none;transition:border-color var(--tr)}
    .stin:focus{border-color:var(--accent)}
    .strm{background:none;border:none;color:var(--t3);transition:var(--tr);padding:2px;display:flex;align-items:center}
    .strm:hover{color:var(--danger)}
    .ast{display:flex;align-items:center;gap:6px;background:none;border:1px dashed var(--border);border-radius:var(--rsm);padding:7px 12px;color:var(--t2);font-size:13px;width:100%;margin-top:5px;transition:var(--tr)}
    .ast:hover{border-color:var(--accent);color:var(--accent)}
    .mft{display:flex;gap:10px;margin-top:22px}
    .bs{flex:1;padding:11px;background:var(--s2);border:1px solid var(--border);color:var(--t1);border-radius:var(--rmd);font-size:14px;font-weight:500;transition:var(--tr)}
    .bs:hover{background:var(--s3)}
    .bsv{flex:2;padding:11px;background:linear-gradient(135deg,var(--accent),var(--a2));color:#fff;border:none;border-radius:var(--rmd);font-size:14px;font-weight:600;transition:var(--tr)}
    .bsv:hover{opacity:.9;box-shadow:0 6px 20px var(--aglow)}
    .bd{flex:1;padding:11px;background:var(--danger);color:#fff;border:none;border-radius:var(--rmd);font-size:14px;font-weight:600;transition:var(--tr)}
    .bd:hover{opacity:.9}
    .cm{max-width:370px}

    /* EMPTY */
    .es{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 20px;text-align:center}
    .esi{font-size:48px;margin-bottom:16px}
    .est{font-family:var(--fd);font-size:18px;font-weight:700;margin-bottom:7px}
    .ess{color:var(--t2);font-size:14px;margin-bottom:22px;max-width:280px;line-height:1.6}

    /* TOAST */
    #tc{position:fixed;bottom:24px;right:24px;z-index:500;display:flex;flex-direction:column;gap:8px}
    .tst{background:var(--s3);border:1px solid var(--border);border-radius:var(--rmd);padding:12px 16px;display:flex;align-items:center;gap:10px;font-size:13.5px;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:tin .3s var(--ts) forwards;min-width:240px}
    .tst.s{border-left:3px solid var(--ok)}.tst.e{border-left:3px solid var(--danger)}.tst.i{border-left:3px solid var(--accent)}
    @keyframes tin{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
    @keyframes tout{to{opacity:0;transform:translateX(40px)}}

    /* SETTINGS */
    .sse{margin-bottom:28px}
    .sst{font-family:var(--fd);font-size:15px;font-weight:700;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
    .sr{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border)}
    .sr:last-child{border-bottom:none}
    .srl{font-size:14px;font-weight:500}
    .srd{font-size:12px;color:var(--t2);margin-top:2px}

    /* TODAY */
    .tsec{margin-bottom:22px}
    .tsl{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:9px;display:flex;align-items:center;gap:8px}
    .tsl::after{content:'';flex:1;height:1px;background:var(--border)}
    .pls{width:8px;height:8px;border-radius:50%;background:var(--danger);animation:plsa 1.5s ease-in-out infinite}
    @keyframes plsa{0%,100%{opacity:1}50%{opacity:.25}}

    /* MISC */
    .dsep{width:1px;height:18px;background:var(--border)}
    @keyframes vf{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
    @media(max-width:900px){.sg{grid-template-columns:repeat(2,1fr)}.dg{grid-template-columns:1fr}.wg{grid-template-columns:repeat(4,1fr)}}
    @media(max-width:600px){.sg{grid-template-columns:1fr 1fr}.wg{grid-template-columns:repeat(2,1fr)}.ac{width:calc(100vw - 32px);padding:30px 22px}.modal{width:calc(100vw - 28px);padding:22px}.fr{grid-template-columns:1fr}}
  </style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div class="ag"></div>
  <div class="ac">
    <div class="alg"><div class="alm">T</div><div class="alt">Taskveil</div></div>
    <div id="atit" class="atit">Welcome back</div>
    <div id="asub" class="asub">Sign in to continue to your workspace</div>
    <div class="atabs">
      <button class="atab on" onclick="swtab('login')">Sign In</button>
      <button class="atab" onclick="swtab('reg')">Create Account</button>
    </div>
    <div id="aerr" class="aerr"></div>
    <div id="ang" class="fg" style="display:none"><label class="fl">Full Name</label><input type="text" class="fi" id="anm" placeholder="Your full name"></div>
    <div class="fg"><label class="fl">Email address</label><input type="email" class="fi" id="aem" placeholder="you@example.com"></div>
    <div class="fg"><label class="fl">Password</label><input type="password" class="fi" id="apw" placeholder="••••••••"></div>
    <button class="bp" id="abtn" onclick="doAuth()">Sign In</button>
    <div class="anote">Your data is saved securely across sessions</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav id="sb">
    <div class="sbh">
      <div class="sbm">T</div>
      <div class="sbn">Taskveil</div>
      <button class="scb" id="colbtn" onclick="toggleSB()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path id="colic" d="m15 18-6-6 6-6"/></svg>
      </button>
    </div>
    <div class="sbu">
      <div class="uav" id="sbav">J</div>
      <div class="uif"><div class="unm" id="sbnm">...</div><div class="uem" id="sbem">...</div></div>
    </div>
    <div class="sbnv">
      <div class="nl">Overview</div>
      <button class="ni on" data-v="dash" onclick="nav('dash')">
        <svg class="nico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span class="nlb">Dashboard</span>
      </button>
      <div class="nl">Tasks</div>
      <button class="ni" data-v="all" onclick="nav('all')">
        <svg class="nico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        <span class="nlb">All Tasks</span><span class="nbdg" id="bdga">0</span>
      </button>
      <button class="ni" data-v="today" onclick="nav('today')">
        <svg class="nico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span class="nlb">Today</span><span class="nbdg" id="bdgt">0</span>
      </button>
      <div class="nl">Schedule</div>
      <button class="ni" data-v="week" onclick="nav('week')">
        <svg class="nico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span class="nlb">Weekly</span>
      </button>
      <button class="ni" data-v="month" onclick="nav('month')">
        <svg class="nico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="7" y1="14" x2="7.01" y2="14" stroke-width="3"/><line x1="12" y1="14" x2="12.01" y2="14" stroke-width="3"/><line x1="17" y1="14" x2="17.01" y2="14" stroke-width="3"/><line x1="7" y1="18" x2="7.01" y2="18" stroke-width="3"/><line x1="12" y1="18" x2="12.01" y2="18" stroke-width="3"/></svg>
        <span class="nlb">Monthly</span>
      </button>
      <div class="nl">Account</div>
      <button class="ni" data-v="settings" onclick="nav('settings')">
        <svg class="nico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <span class="nlb">Settings</span>
      </button>
    </div>
    <div class="sbst" id="sbst">
      <div class="mst"><span class="msl">Completion</span><span class="msv" id="mspct">0%</span></div>
      <div class="mpb"><div class="mpf" id="msbar" style="width:0%"></div></div>
    </div>
    <div class="sbbot">
      <button class="ni" onclick="doLogout()" style="color:var(--danger)">
        <svg class="nico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span class="nlb">Sign Out</span>
      </button>
    </div>
  </nav>
  <div id="main">
    <div id="tb">
      <div><span class="tbt" id="tbt">Dashboard</span><span class="tbs" id="tbs"></span></div>
      <div class="tbsr">
        <svg class="sic" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="sin" id="srch" placeholder="Search tasks…  ⌘K" oninput="doSrch(this.value)">
      </div>
      <button class="tbb" onclick="openMod()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Task
      </button>
    </div>
    <div id="ct"></div>
  </div>
</div>

<!-- TASK MODAL -->
<div class="ov" id="tov" onclick="ovCl(event,'tov')">
  <div class="modal">
    <div class="mh2"><div class="mtt" id="mtt">New Task</div><button class="mcl" onclick="closeMod()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="fg"><label class="fl">Task Title *</label><input type="text" class="fi" id="mt" placeholder="What needs to be done?"></div>
    <div class="fg"><label class="fl">Description</label><textarea class="fta" id="md" placeholder="Add more details…"></textarea></div>
    <div class="fr">
      <div class="fg"><label class="fl">Priority</label><select class="fs" id="mp"><option value="medium">🟡 Medium</option><option value="high">🔴 High</option><option value="low">🟢 Low</option></select></div>
      <div class="fg"><label class="fl">Category</label><select class="fs" id="mc"><option value="work">💼 Work</option><option value="personal">🏠 Personal</option><option value="health">💪 Health</option><option value="learning">📚 Learning</option><option value="finance">💰 Finance</option><option value="other">📌 Other</option></select></div>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">Deadline</label><input type="date" class="fi" id="mdl"></div>
      <div class="fg"><label class="fl">Time</label><input type="time" class="fi" id="mti"></div>
    </div>
    <div class="fg"><label class="fl">Recurrence</label><select class="fs" id="mr"><option value="none">None</option><option value="daily">Daily</option><option value="weekly">Weekly</option><option value="monthly">Monthly</option></select></div>
    <div class="fg"><label class="fl">Tags <span style="color:var(--t3)">(comma separated)</span></label><input type="text" class="fi" id="mtg" placeholder="design, urgent, frontend"></div>
    <div class="fg">
      <label class="fl">Subtasks</label>
      <div class="stl" id="stl"></div>
      <button class="ast" onclick="addST()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add subtask</button>
    </div>
    <div class="mft">
      <button class="bs" onclick="closeMod()">Cancel</button>
      <button class="bsv" id="savbtn" onclick="saveTask()">Create Task</button>
    </div>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="ov" id="dov" onclick="ovCl(event,'dov')">
  <div class="modal cm">
    <div class="mtt" style="margin-bottom:10px">Delete Task</div>
    <div style="color:var(--t2);font-size:14px;line-height:1.6">This task will be permanently deleted. This action cannot be undone.</div>
    <div class="mft" style="margin-top:18px">
      <button class="bs" onclick="closeDel()">Cancel</button>
      <button class="bd" onclick="confDel()">Delete</button>
    </div>
  </div>
</div>

<div id="tc"></div>

<script>
// STORAGE
const S={
  async get(k){try{if(window.storage){const r=await window.storage.get(k);return r?JSON.parse(r.value):null}return null}catch{return null}},
  async set(k,v){try{if(window.storage){await window.storage.set(k,JSON.stringify(v));return true}return false}catch{return false}},
  async del(k){try{if(window.storage)await window.storage.delete(k)}catch{}}
};

// STATE
let CU=null,tasks=[],editId=null,delId=null,mSubs=[],mSubCtr=0;
let filt={st:'all',pr:'all',ca:'all'};
let srchQ='',view='dash',moOff=0,sbCol=false,authMode='login';
const CATS={work:'💼 Work',personal:'🏠 Personal',health:'💪 Health',learning:'📚 Learning',finance:'💰 Finance',other:'📌 Other'};

// AUTH
function swtab(m){
  authMode=m;
  document.querySelectorAll('.atab').forEach((t,i)=>t.classList.toggle('on',(m==='login'&&i===0)||(m==='reg'&&i===1)));
  document.getElementById('ang').style.display=m==='reg'?'block':'none';
  document.getElementById('atit').textContent=m==='login'?'Welcome back':'Create your account';
  document.getElementById('asub').textContent=m==='login'?'Sign in to continue to your workspace':'Get organized in minutes';
  document.getElementById('abtn').textContent=m==='login'?'Sign In':'Create Account';
  document.getElementById('aerr').style.display='none';
}

async function hashPW(pw){
  const e=new TextEncoder().encode(pw+'taskveil_s2024');
  const b=await crypto.subtle.digest('SHA-256',e);
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}

async function doAuth(){
  const email=document.getElementById('aem').value.trim().toLowerCase();
  const pw=document.getElementById('apw').value;
  const btn=document.getElementById('abtn');
  const err=document.getElementById('aerr');
  err.style.display='none';
  if(!email||!pw)return showErr('Please fill in all fields.');
  if(!email.includes('@'))return showErr('Enter a valid email address.');
  btn.textContent='Please wait…';btn.disabled=true;
  try{
    if(authMode==='reg'){
      const name=document.getElementById('anm').value.trim();
      if(!name){btn.textContent='Create Account';btn.disabled=false;return showErr('Enter your full name.');}
      if(pw.length<6){btn.textContent='Create Account';btn.disabled=false;return showErr('Password must be at least 6 characters.');}
      const ex=await S.get('u:'+email);
      if(ex){btn.textContent='Create Account';btn.disabled=false;return showErr('An account with this email already exists.');}
      const hash=await hashPW(pw);
      const user={name,email,hash,createdAt:Date.now()};
      await S.set('u:'+email,user);await S.set('t:'+email,[]);await S.set('sess',{email});
      CU=user;tasks=[];loginOK();
    }else{
      const user=await S.get('u:'+email);
      if(!user){btn.textContent='Sign In';btn.disabled=false;return showErr('No account found with this email.');}
      const hash=await hashPW(pw);
      if(hash!==user.hash){btn.textContent='Sign In';btn.disabled=false;return showErr('Incorrect password.');}
      await S.set('sess',{email});CU=user;tasks=(await S.get('t:'+email))||[];loginOK();
    }
  }catch(e){btn.textContent=authMode==='login'?'Sign In':'Create Account';btn.disabled=false;showErr('Something went wrong. Please try again.');}
}

function showErr(m){const e=document.getElementById('aerr');e.textContent=m;e.style.display='block';}

function loginOK(){
  document.getElementById('auth').style.display='none';
  document.getElementById('app').classList.add('on');
  updSBU();updBdg();nav('dash');
  toast('Welcome back, '+CU.name.split(' ')[0]+'! 👋','s');
}

async function doLogout(){
  await S.del('sess');CU=null;tasks=[];
  document.getElementById('app').classList.remove('on');
  document.getElementById('auth').style.display='flex';
  document.getElementById('aem').value='';document.getElementById('apw').value='';
  document.getElementById('abtn').textContent='Sign In';document.getElementById('abtn').disabled=false;
  swtab('login');
}

function updSBU(){
  if(!CU)return;
  document.getElementById('sbav').textContent=CU.name.charAt(0).toUpperCase();
  document.getElementById('sbnm').textContent=CU.name;
  document.getElementById('sbem').textContent=CU.email;
}

// SIDEBAR
function toggleSB(){
  sbCol=!sbCol;
  document.getElementById('sb').classList.toggle('col',sbCol);
  document.getElementById('colic').setAttribute('d',sbCol?'m9 18 6-6-6-6':'m15 18-6-6 6-6');
}

// NAV
const VTITLES={dash:['Dashboard','Your workspace at a glance'],all:['All Tasks','Everything in one place'],today:['Today',''],week:['This Week','Weekly schedule view'],month:['Monthly','Monthly calendar view'],settings:['Settings','Manage your account']};

function nav(v){
  view=v;
  document.querySelectorAll('.ni[data-v]').forEach(n=>n.classList.toggle('on',n.dataset.v===v));
  const [t,s]=VTITLES[v]||[v,''];
  document.getElementById('tbt').textContent=t;
  document.getElementById('tbs').textContent=v==='today'?new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}):s;
  srchQ='';document.getElementById('srch').value='';
  render();
}

function render(){
  const c=document.getElementById('ct');
  c.style.cssText='opacity:0;transform:translateY(8px);transition:none';
  requestAnimationFrame(()=>{c.style.cssText='transition:opacity .22s ease,transform .22s ease;opacity:1;transform:translateY(0)';});
  ({dash:rDash,all:rAll,today:rToday,week:rWeek,month:rMonth,settings:rSettings}[view]||rDash)();
}

// TASKS
async function saveT(){if(CU)await S.set('t:'+CU.email,tasks);updBdg();}

function updBdg(){
  const ts=todStr();
  document.getElementById('bdga').textContent=tasks.filter(t=>t.status!=='done').length;
  document.getElementById('bdgt').textContent=tasks.filter(t=>t.deadline===ts&&t.status!=='done').length;
  const tot=tasks.length,dn=tasks.filter(t=>t.status==='done').length,pct=tot?Math.round(dn/tot*100):0;
  document.getElementById('mspct').textContent=pct+'%';
  document.getElementById('msbar').style.width=pct+'%';
}

function todStr(){return new Date().toISOString().split('T')[0];}

function dlInfo(ds,ts){
  if(!ds)return{l:'',c:''};
  const now=new Date();now.setHours(0,0,0,0);
  const d=new Date(ds+'T00:00:00'),diff=Math.round((d-now)/86400000);
  if(diff<0)return{l:Math.abs(diff)+'d overdue',c:'ov'};
  if(diff===0)return{l:ts?'Today '+ts:'Today',c:'sn'};
  if(diff===1)return{l:'Tomorrow',c:'sn'};
  if(diff<=3)return{l:'In '+diff+' days',c:'sn'};
  return{l:d.toLocaleDateString('en-US',{month:'short',day:'numeric'}),c:'ok'};
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function getT(){
  let ts=[...tasks];
  if(srchQ)ts=ts.filter(t=>t.title.toLowerCase().includes(srchQ)||(t.description||'').toLowerCase().includes(srchQ)||(t.tags||[]).some(g=>g.toLowerCase().includes(srchQ)));
  if(filt.st==='active')ts=ts.filter(t=>t.status!=='done');
  else if(filt.st==='done')ts=ts.filter(t=>t.status==='done');
  if(filt.pr!=='all')ts=ts.filter(t=>t.priority===filt.pr);
  if(filt.ca!=='all')ts=ts.filter(t=>t.category===filt.ca);
  return ts;
}

function card(task){
  const dl=dlInfo(task.deadline,task.time);
  const sd=(task.subtasks||[]).filter(s=>s.done).length,st=(task.subtasks||[]).length;
  const tags=(task.tags||[]).slice(0,2);
  return`<div class="ti ${task.status==='done'?'dn':''}">
    <div class="ck ${task.status==='done'?'on':''}" onclick="togDone('${task.id}');event.stopPropagation()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="tb2" onclick="openMod('${task.id}')">
      <div class="tt">${esc(task.title)}</div>
      <div class="tm">
        <div class="pd ${task.priority||'medium'}"></div>
        <span class="cp ${task.category||'other'}">${CATS[task.category||'other']}</span>
        ${dl.c?`<span class="dl ${dl.c}">${dl.l}</span>`:''}
        ${tags.map(t=>`<span class="tg">${esc(t)}</span>`).join('')}
        ${st?`<span style="font-size:11.5px;color:var(--t2);display:flex;align-items:center;gap:3px"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>${sd}/${st}</span>`:''}
      </div>
    </div>
    <div class="ta">
      <button class="tab" onclick="openMod('${task.id}');event.stopPropagation()" title="Edit">

async function togDone(id){

  else{t.status='done';t.completedAt=Date.now();toast('Task completed! ✅','s');confetti();}
  t.updatedAt=Date.now();await saveT();render();
}

function confetti(){
  const cols=['#7C6FFF','#A78BFA','#3ECFA3','#FFB347','#FF5E7D'];
  if(!document.getElementById('cfx')){const s=document.createElement('style');s.id='cfx';s.textContent='@keyframes cf{0%{opacity:1;transform:scale(1) translateY(0)}100%{opacity:0;transform:scale(0) translateY(-80px)}}';document.head.appendChild(s);}

function askDel(id){delId=id;document.getElementById('dov').classList.add('open');}
async function confDel(){
  if(!delId)return;

}
function closeDel(){document.getElementById('dov').classList.remove('open');delId=null;}

function openMod(id=null){

function rSubs(){

async function saveTask(){
  const title=document.getElementById('mt').value.trim();
  if(!title){toast('Please enter a task title.','e');document.getElementById('mt').focus();return;}
  const tags=document.getElementById('mtg').value.split(',').map(t=>t.trim()).filter(Boolean);
  const subtasks=mSubs.filter(s=>s.title.trim());
  const data={title,description:document.getElementById('md').value.trim(),priority:document.getElementById('mp').value,category:document.getElementById('mc').value,deadline:document.getElementById('mdl').value,time:document.getElementById('mti').value,recurrence:document.getElementById('mr').value,tags,subtasks};
  if(editId){
    const i=tasks.findIndex(t=>t.id===editId);
    if(i!==-1)tasks[i]={...tasks[i],...data,updatedAt:Date.now()};
    toast('Task updated ✓','s');
  }else{
    tasks.unshift({id:Date.now().toString(36)+Math.random().toString(36).slice(2),...data,status:'todo',createdAt:Date.now(),updatedAt:Date.now(),completedAt:null});
    toast('Task created! 🎯','s');
  }
  await saveT();closeMod();render();
}

// SEARCH / FILTER / SORT
function doSrch(v){srchQ=v.toLowerCase();render();}
function setF(k,v){filt[k]=v;render();}
function sortBy(by){
  if(by==='deadline')tasks.sort((a,b)=>(a.deadline||'9999')<(b.deadline||'9999')?-1:1);
  else if(by==='priority'){const p={high:0,medium:1,low:2};tasks.sort((a,b)=>(p[a.priority]||1)-(p[b.priority]||1));}
  else if(by==='alpha')tasks.sort((a,b)=>a.title.localeCompare(b.title));
  else tasks.sort((a,b)=>b.createdAt-a.createdAt);
  render();
}

function rMonth(){
  const today=new Date(),yr=today.getFullYear(),mn=today.getMonth();
  const vd=new Date(yr,mn+moOff,1),vy=vd.getFullYear(),vm=vd.getMonth();
  const lbl=vd.toLocaleDateString('en-US',{month:'long',year:'numeric'}),ts=todStr();
  const fd=new Date(vy,vm,1).getDay(),dim=new Date(vy,vm+1,0).getDate(),dpm=new Date(vy,vm,0).getDate();
  const cells=[];
  for(let i=fd-1;i>=0;i--)cells.push({d:dpm-i,m:vm-1,y:vy,o:true});
  for(let d=1;d<=dim;d++)cells.push({d,m:vm,y:vy,o:false});
  let i=1;while(cells.length<42)cells.push({d:i++,m:vm+1,y:vy,o:true});

  document.getElementById('ct').innerHTML=`
  <div class="mhd">
    <button class="mnb" onclick="chMo(-1)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>

    </div>
  </div>
  <div class="mg">
    ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="mwd">${d}</div>`).join('')}
    ${cells.map(cell=>{
      const cm=((cell.m%12)+12)%12,cy=cell.m<0?cell.y-1:cell.m>11?cell.y+1:cell.y;
      const ds=`${cy}-${String(cm+1).padStart(2,'0')}-${String(cell.d).padStart(2,'0')}`;
      const isT=ds===ts,dt=tasks.filter(t=>t.deadline===ds),vt=dt.slice(0,2),more=dt.length-vt.length;
      return`<div class="md ${cell.o?'om':''} ${isT?'td':''}" onclick="openModDate('${ds}')">
        <div class="mdn">${cell.d}</div>
        ${vt.map(t=>`<div class="mtd ${t.priority}" onclick="event.stopPropagation();openMod('${t.id}')" title="${esc(t.title)}">${esc(t.title)}</div>`).join('')}
        ${more>0?`<div class="mmr">+${more} more</div>`:''}
      </div>`;
    }).join('')}
  </div>`;
}

      <div class="sst">Your Statistics</div>
      <div class="card">
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;text-align:center">
          <div><div style="font-family:var(--fd);font-size:30px;font-weight:800">${tot}</div><div style="font-size:12px;color:var(--t2)">Total Created</div></div>
          <div><div style="font-family:var(--fd);font-size:30px;font-weight:800">${dn}</div><div style="font-size:12px;color:var(--t2)">Completed</div></div>
          <div><div style="font-family:var(--fd);font-size:30px;font-weight:800">${tot?Math.round(dn/tot*100):0}%</div><div style="font-size:12px;color:var(--t2)">Success Rate</div></div>
        </div>
      </div>
    </div>
    <div class="sse">
      <div class="sst">Security</div>
      <div class="card">
        <div class="sr"><div><div class="srl">Email Address</div><div class="srd">${esc(CU.email)}</div></div></div>
        <div class="sr">
          <div><div class="srl">Change Password</div><div class="srd">Update your account password</div></div>
          <button class="fbtn" onclick="document.getElementById('pwf').style.display=document.getElementById('pwf').style.display==='none'?'block':'none'">Change</button>
        </div>
        <div id="pwf" style="display:none;padding-top:16px">
          <div class="fg"><label class="fl">Current Password</label><input type="password" class="fi" id="cpw" placeholder="••••••••"></div>
          <div class="fg"><label class="fl">New Password</label><input type="password" class="fi" id="npw" placeholder="••••••••"></div>
          <button class="bsv" style="width:auto;padding:10px 24px" onclick="chgPw()">Update Password</button>
        </div>
      </div>
    </div>
    <div class="sse">
      <div class="sst">Danger Zone</div>
      <div class="card">
        <div class="sr">
          <div><div class="srl" style="color:var(--danger)">Delete All Tasks</div><div class="srd">Permanently remove all your tasks</div></div>
          <button class="fbtn" style="color:var(--danger);border-color:var(--danger)" onclick="delAll()">Delete All</button>
        </div>
      </div>
    </div>
    <div style="text-align:center;color:var(--t3);font-size:12px;margin-top:8px">Taskveil v1.0 — Work with Clarity</div>
  </div>`;
}

async function updProfile(){
  const name=document.getElementById('snm').value.trim();
  if(!name){toast('Name cannot be empty','e');return;}
  CU.name=name;await S.set('u:'+CU.email,CU);updSBU();toast('Profile updated ✓','s');rSettings();
}

async function chgPw(){
  const cp=document.getElementById('cpw').value,np=document.getElementById('npw').value;
  if(!cp||!np){toast('Please fill in both fields','e');return;}
  if(np.length<6){toast('New password must be at least 6 characters','e');return;}
  const ch=await hashPW(cp);
  if(ch!==CU.hash){toast('Current password is incorrect','e');return;}
  CU.hash=await hashPW(np);await S.set('u:'+CU.email,CU);
  toast('Password updated successfully','s');document.getElementById('pwf').style.display='none';
}

async function delAll(){
  if(!confirm('Delete ALL tasks permanently? This cannot be undone.'))return;
  tasks=[];await saveT();toast('All tasks deleted','i');nav('dash');
}

// TOAST
function toast(msg,type='i'){
  const c=document.getElementById('tc');
  const d=document.createElement('div');
  const ic={s:'✅',e:'❌',i:'💡'}[type]||'•';
  d.className='tst '+type;d.innerHTML=`<span>${ic}</span><span>${msg}</span>`;
  c.appendChild(d);
  setTimeout(()=>{d.style.animation='tout .3s ease forwards';setTimeout(()=>d.remove(),300);},3200);
}

// KEYBOARD
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeMod();closeDel();}
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('srch').focus();}
  if((e.metaKey||e.ctrlKey)&&e.key==='n'){e.preventDefault();if(document.getElementById('app').classList.contains('on'))openMod();}
});
document.getElementById('apw').addEventListener('keydown',e=>{if(e.key==='Enter')doAuth();});

// INIT
async function init(){
  try{
    const sess=await S.get('sess');
    if(sess?.email){
      const user=await S.get('u:'+sess.email);
      if(user){
        CU=user;tasks=(await S.get('t:'+sess.email))||[];
        document.getElementById('auth').style.display='none';
        document.getElementById('app').classList.add('on');
        updSBU();updBdg();nav('dash');return;
      }
    }
  }catch(e){}
  document.getElementById('auth').style.display='flex';
}
init();
</script>
</body>
</html>
